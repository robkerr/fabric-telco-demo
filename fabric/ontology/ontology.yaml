# Telco customer-service ontology — as built in Fabric (item: "TelcoOntology").
#
# This file mirrors the live Fabric IQ Ontology (preview) item so it can be (a) read as the
# design spec, and (b) reused later for scripted recreation. It was reverse-engineered from the
# workspace with scripts/export_ontology.ps1 and kept in sync by hand.
#
# The ontology gives the Fabric Data Agent (item: "TelcoOntologyDataAgent") a graph the agent
# can traverse with GQL, so relationship questions ("what coverage does this geography have?",
# "which subscriptions are on this account?") resolve across tables.

domain: TelecommunicationsCustomerService
fabric_item: TelcoOntology          # the Ontology (preview) item name in the workspace

# ----------------------------------------------------------------------------------
# Entity types  ->  bound gold table  +  key.  (11 entities, all in the gold schema.)
# ----------------------------------------------------------------------------------
entities:
  Customer:
    table: dim_customer
    key: customer_id
    synonyms: [subscriber, account holder, client]
    key_attributes: [first_name, last_name, segment, tenure_months, geo_id]

  Account:
    table: dim_account
    key: account_id
    synonyms: [billing account]
    states: [active, suspended, cancelled]
    key_attributes: [status, open_date, autopay, credit_class, is_new_customer]

  Geography:
    table: dim_geography
    key: geo_id
    synonyms: [location, service area, zip]
    key_attributes: [zip, city, state, region, urban_flag]

  Coverage:
    table: fact_coverage
    key: coverage_id
    synonyms: [available service, speeds]
    key_attributes: [technology, max_down_mbps, max_up_mbps]

  Product:
    table: dim_product
    key: product_id
    synonyms: [service, line of business]
    members: [internet, mobile, voice, tv]

  Plan:
    table: dim_plan
    key: plan_id
    synonyms: [rate plan, tariff]
    key_attributes: [name, price, speed_mbps, data_gb]

  Subscription:
    table: fact_subscription
    key: subscription_id
    describes: A product instance a customer holds (with plan + device + MRC).

  Invoice:
    table: fact_invoice
    key: invoice_id
    synonyms: [bill, statement]
    notes: "is_first_bill = true marks the customer's first invoice."

  WorkOrder:
    table: fact_work_order
    key: work_order_id
    synonyms: [ticket, service request, truck roll]

  Appointment:
    table: fact_appointment
    key: appointment_id
    synonyms: [visit, technician window]

  Contact:
    table: fact_contact
    key: contact_id
    synonyms: [interaction, call, chat]
    key_attributes: [channel, reason, handoff_to_agent]

# ----------------------------------------------------------------------------------
# Relationship types (10).  Each edge is bound to a "mapping table" that contains BOTH
# the source key and the target key in the same row (see fabric/ontology/README.md ->
# "How to author a relationship"). from_key/to_key are the columns in mapping_table.
# ----------------------------------------------------------------------------------
relationships:
  - name: customer_owns_account
    from: Customer            # source / origin entity
    to: Account              # target entity
    mapping_table: dim_account
    from_key: customer_id
    to_key: account_id

  - name: customer_has_location
    from: Customer
    to: Geography
    mapping_table: dim_customer
    from_key: customer_id
    to_key: geo_id

  - name: account_has_subscription
    from: Account
    to: Subscription
    mapping_table: fact_subscription
    from_key: account_id
    to_key: subscription_id

  - name: subscription_for_product
    from: Subscription
    to: Product
    mapping_table: fact_subscription
    from_key: subscription_id
    to_key: product_id

  - name: subscription_has_plan
    from: Subscription
    to: Plan
    mapping_table: fact_subscription
    from_key: subscription_id
    to_key: plan_id

  - name: account_has_invoice
    from: Account
    to: Invoice
    mapping_table: fact_invoice
    from_key: account_id
    to_key: invoice_id

  - name: account_has_workorder
    from: Account
    to: WorkOrder
    mapping_table: fact_work_order
    from_key: account_id
    to_key: work_order_id

  - name: workorder_has_appointment
    from: WorkOrder
    to: Appointment
    mapping_table: fact_appointment
    from_key: work_order_id
    to_key: appointment_id

  - name: geo_has_coverage
    from: Geography
    to: Coverage
    mapping_table: fact_coverage
    from_key: geo_id
    to_key: coverage_id

  - name: customer_is_contacted
    from: Account
    to: Contact
    mapping_table: fact_contact
    from_key: customer_id     # NOTE: fact_contact carries customer_id, not account_id.
    to_key: contact_id        # Consider re-scoping this edge to Customer -> Contact.

# ----------------------------------------------------------------------------------
# Business glossary — term -> precise data-model meaning (disambiguates NL queries).
# ----------------------------------------------------------------------------------
glossary:
  "first bill": fact_invoice WHERE is_first_bill = true
  "new customer": dim_account WHERE is_new_customer = true
  "past due": fact_invoice WHERE paid = false AND due_date < today
  "coverage": fact_coverage rows for a Geography (available technology + speeds)
  "handoff": fact_contact WHERE handoff_to_agent = true (web -> live agent)

# ----------------------------------------------------------------------------------
# How ontology entities support each demo journey.
# ----------------------------------------------------------------------------------
journeys:
  acquisition_and_crosssell:
    entities: [Customer, Account, Subscription, Product, Plan]
    signal: fact_contact.handoff_to_agent = true (web -> agent handoff)
  first_bill_support:
    entities: [Invoice, Account, Subscription]
    signal: fact_invoice.is_first_bill = true
  service_degradation_and_retention:
    entities: [Geography, Coverage, WorkOrder, Appointment, Account]
    signal: coverage/technology in the customer's geography + open work orders

